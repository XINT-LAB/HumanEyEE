<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HumanEyE AI</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify to safely render HTML from Markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- Tailwind Config for Dark Mode and Custom Colors -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        primaryHover: '#2563eb',
                        darkBg: '#0f172a',
                        darkSurface: '#1e293b',
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Wavy Rainbow Text Animation */
        @keyframes rainbow {
            0% { color: #ef4444; } 16% { color: #f97316; } 33% { color: #eab308; }
            50% { color: #22c55e; } 66% { color: #3b82f6; } 83% { color: #a855f7; } 100% { color: #ef4444; }
        }
        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .wavy-char {
            display: inline-block;
            animation: wave 1.5s ease-in-out infinite, rainbow 4s linear infinite;
        }

        /* Message Pop-in Animation */
        @keyframes popIn {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .msg-animate {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Blinking Cursor for Typing */
        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 1em;
            background-color: currentColor;
            vertical-align: text-bottom;
            animation: blink 1s step-start infinite;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Bouncing Loader Animation */
        .typing-loader {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
        }
        .typing-loader span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #3b82f6;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-loader span:nth-child(1) { animation-delay: -0.32s; }
        .typing-loader span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Markdown Prose Styling */
        .markdown-body { font-family: inherit; line-height: 1.6; word-break: break-word; }
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body pre {
            background-color: #1e293b; color: #f8fafc; padding: 1rem;
            border-radius: 0.5rem; overflow-x: auto; margin: 0.75em 0;
            border: 1px solid #334155;
        }
        .markdown-body code {
            font-family: monospace; background-color: rgba(148, 163, 184, 0.2);
            padding: 0.2em 0.4em; border-radius: 0.25rem; font-size: 0.9em;
        }
        .markdown-body pre code { background-color: transparent; padding: 0; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body a { color: #3b82f6; text-decoration: underline; }
        .markdown-body strong { font-weight: 600; }
        
        /* DeepSeek Think Tag Support */
        think {
            display: block; border-left: 3px solid #64748b;
            background: rgba(100, 116, 139, 0.05); padding: 10px; margin: 10px 0;
            color: #64748b; font-size: 0.9em; border-radius: 0 8px 8px 0;
            font-style: italic;
        }
        .dark think { color: #94a3b8; border-left-color: #475569; }

        /* Global Layout Fixes */
        body, html { margin: 0; padding: 0; width: 100%; overscroll-behavior-y: none; }
        textarea { resize: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-gray-100 transition-colors duration-300 antialiased">

    <!-- Fallback Loader -->
    <div id="loading" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white dark:bg-darkBg transition-opacity duration-500">
        <svg viewBox="0 0 24 24" class="w-16 h-16 animate-spin-slow text-primary mb-4">
            <polygon points="12,2 22,12 12,22 2,12" fill="transparent" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <div class="text-xl font-bold tracking-widest text-gray-600 dark:text-gray-300 animate-pulse">Initializing HumanEyE...</div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="hidden flex flex-col md:flex-row min-h-[100dvh] w-full overflow-hidden relative">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity duration-300 opacity-0" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-white dark:bg-darkSurface border-r border-gray-200 dark:border-gray-800 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col h-[100dvh] shadow-xl md:shadow-none">
            <div class="p-4 flex items-center justify-between border-b border-gray-100 dark:border-gray-800">
                <button onclick="createNewChat()" class="flex-1 bg-primary hover:bg-primaryHover text-white py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] active:scale-95 shadow-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span class="font-medium">New Chat</span>
                </button>
                <button class="md:hidden ml-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" onclick="toggleSidebar()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Chat History -->
            <div class="flex-1 overflow-y-auto p-3 space-y-1.5" id="chat-list">
                <!-- Chats dynamically inserted here -->
            </div>

            <!-- Sidebar Bottom Settings -->
            <div class="p-4 border-t border-gray-100 dark:border-gray-800 space-y-2 bg-gray-50/50 dark:bg-darkSurface">
                <button onclick="openSettings()" class="w-full flex items-center gap-3 p-2.5 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm font-medium text-gray-700 dark:text-gray-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings & API
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-[100dvh] relative min-w-0">
            <!-- Header -->
            <header class="h-16 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 sticky top-0 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md z-20">
                <div class="flex items-center gap-3">
                    <button class="md:hidden p-2 -ml-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" onclick="toggleSidebar()">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <!-- Animated Logo and Name -->
                    <div class="flex items-center gap-2 select-none group cursor-pointer" onclick="createNewChat()">
                        <svg viewBox="0 0 24 24" class="w-8 h-8 text-primary group-hover:rotate-90 transition-transform duration-500">
                            <polygon points="12,2 22,12 12,22 2,12" fill="transparent" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        </svg>
                        <h1 id="brand-name" class="text-xl font-bold tracking-wide flex"></h1>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-all transform hover:scale-110 focus:outline-none" aria-label="Toggle Dark Mode">
                        <svg id="theme-icon-light" class="w-6 h-6 hidden dark:block text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg id="theme-icon-dark" class="w-6 h-6 block dark:hidden text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <button onclick="openSettings()" class="md:hidden p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>
            </header>

            <!-- Chat Area -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 scroll-smooth pb-32">
                <!-- Welcome Screen -->
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center space-y-6 msg-animate">
                    <svg viewBox="0 0 24 24" class="w-24 h-24 text-primary opacity-90 animate-pulse-fast">
                        <polygon points="12,2 22,12 12,22 2,12" fill="transparent" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    <h2 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-blue-500 via-purple-500 to-blue-500 bg-[length:200%_auto] bg-clip-text text-transparent animate-[rainbow_4s_linear_infinite]">
                        Hi User I am HumanEyE<br/>How Can I Assist You Today
                    </h2>
                </div>
            </div>

            <!-- Input Area (Sticky Bottom) -->
            <div class="absolute bottom-0 left-0 right-0 p-3 md:p-5 bg-gradient-to-t from-gray-50 via-gray-50 to-transparent dark:from-darkBg dark:via-darkBg dark:to-transparent pt-10">
                <form id="chat-form" class="max-w-4xl mx-auto relative flex items-end gap-2 bg-white dark:bg-darkSurface rounded-2xl border border-gray-300 dark:border-gray-700 shadow-lg focus-within:ring-2 focus-within:ring-primary/50 focus-within:border-primary transition-all p-1">
                    <textarea 
                        id="message-input" 
                        rows="1"
                        class="w-full max-h-[150px] bg-transparent text-gray-900 dark:text-gray-100 placeholder-gray-500 p-3 outline-none resize-none overflow-y-auto"
                        placeholder="Message HumanEyE..."
                        style="min-height: 52px;"
                    ></textarea>
                    <button 
                        type="submit" 
                        id="send-btn"
                        class="p-3 m-1 rounded-xl bg-primary hover:bg-primaryHover text-white transition-all transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center h-[44px] w-[44px] shrink-0"
                    >
                        <svg class="w-5 h-5 translate-x-[-1px] translate-y-[1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-darkSurface rounded-2xl w-full max-w-lg shadow-2xl transform scale-95 transition-transform duration-300 overflow-hidden flex flex-col max-h-[90dvh]">
            <div class="p-5 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white">Settings</h3>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-900 dark:hover:text-white transition-colors p-1 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-5 overflow-y-auto space-y-5">
                <!-- API Key -->
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-darkBg focus:ring-2 focus:ring-primary outline-none transition-all text-gray-900 dark:text-white" placeholder="sk-or-v1-...">
                    <p class="text-xs text-red-500 mt-1 hidden" id="api-error-msg">API Key is required to chat.</p>
                </div>
                <!-- Model -->
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">Model Name</label>
                    <input type="text" id="model-input" class="w-full p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-darkBg focus:ring-2 focus:ring-primary outline-none transition-all text-gray-900 dark:text-white" placeholder="deepseek/deepseek-r1:free">
                </div>
                <!-- System Prompt -->
                <div>
                    <label class="block text-sm font-semibold mb-1 text-gray-700 dark:text-gray-300">System Prompt</label>
                    <textarea id="system-prompt-input" rows="4" class="w-full p-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-darkBg focus:ring-2 focus:ring-primary outline-none transition-all resize-none text-gray-900 dark:text-white" placeholder="You are HumanEyE, an advanced AI assistant..."></textarea>
                </div>
            </div>
            <div class="p-5 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3 bg-gray-50 dark:bg-darkBg/50">
                <button onclick="closeSettings()" class="px-5 py-2.5 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors font-medium text-gray-700 dark:text-gray-300">Cancel</button>
                <button onclick="saveSettings()" class="px-5 py-2.5 bg-primary hover:bg-primaryHover text-white rounded-xl transition-all transform hover:scale-105 active:scale-95 font-medium shadow-lg shadow-blue-500/30">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- MAIN JAVASCRIPT LOGIC (Strictly placed at the very end of body) -->
    <script>
        // --- Core State ---
        const state = {
            apiKey: '',
            model: 'deepseek/deepseek-r1:free',
            systemPrompt: 'You are HumanEyE, an advanced, highly intelligent AI assistant. Respond comprehensively and use markdown for formatting.',
            chats: [],
            activeChatId: null,
            isGenerating: false,
            controller: null
        };

        // --- Initialization ---
        document.addEventListener("DOMContentLoaded", () => {
            initApp();
        });

        function initApp() {
            try {
                loadState();
                setupBrandLogo();
                setupTextareaAutoResize();
                applyTheme();
                renderSidebar();
                renderActiveChat();
                
                // Remove Loader safely
                setTimeout(() => {
                    const loader = document.getElementById('loading');
                    const app = document.getElementById('app');
                    if(loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 500);
                    }
                    if(app) {
                        app.classList.remove('hidden');
                    }
                    
                    // Prompt for API key if missing
                    if (!state.apiKey) {
                        setTimeout(openSettings, 1000);
                    }
                }, 600);

                // Event Listeners
                document.getElementById('chat-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    handleSendMessage();
                });

                const input = document.getElementById('message-input');
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (!state.isGenerating) handleSendMessage();
                    }
                });
            } catch (error) {
                console.error("Initialization Error:", error);
                document.body.innerHTML = `<div class="p-10 text-red-500">Critical Error Loading App: ${error.message}</div>`;
            }
        }

        // --- State Management ---
        function loadState() {
            try {
                const savedChats = localStorage.getItem('humaneye_chats');
                const savedActiveId = localStorage.getItem('humaneye_activeChatId');
                const savedSettings = localStorage.getItem('humaneye_settings');

                if (savedChats) state.chats = JSON.parse(savedChats);
                if (savedActiveId) state.activeChatId = savedActiveId;
                
                if (savedSettings) {
                    const parsed = JSON.parse(savedSettings);
                    state.apiKey = parsed.apiKey || '';
                    state.model = parsed.model || state.model;
                    state.systemPrompt = parsed.systemPrompt || state.systemPrompt;
                }

                if (!state.activeChatId && state.chats.length > 0) {
                    state.activeChatId = state.chats[0].id;
                }
            } catch (e) {
                console.error("Failed to load state", e);
            }
        }

        function saveState() {
            try {
                localStorage.setItem('humaneye_chats', JSON.stringify(state.chats));
                if (state.activeChatId) localStorage.setItem('humaneye_activeChatId', state.activeChatId);
                
                const settings = { 
                    apiKey: state.apiKey,
                    model: state.model,
                    systemPrompt: state.systemPrompt 
                };
                localStorage.setItem('humaneye_settings', JSON.stringify(settings));
            } catch (e) {
                console.error("Failed to save state", e);
            }
        }

        // --- UI & Animations ---
        function setupBrandLogo() {
            const brandEl = document.getElementById('brand-name');
            const text = "HumanEyE";
            brandEl.innerHTML = text.split('').map((char, index) => {
                const delay = index * 0.1;
                return `<span class="wavy-char" style="animation-delay: ${delay}s">${char === ' ' ? '&nbsp;' : char}</span>`;
            }).join('');
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function applyTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function setupTextareaAutoResize() {
            const tx = document.getElementById('message-input');
            tx.addEventListener("input", function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + "px";
                if(this.value === '') this.style.height = '52px';
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        // --- Settings Modal ---
        function openSettings() {
            const modal = document.getElementById('settings-modal');
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;
            document.getElementById('api-error-msg').classList.add('hidden');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
            
            // Auto-close sidebar on mobile if open
            if(window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if(!sidebar.classList.contains('-translate-x-full')) toggleSidebar();
            }
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function saveSettings() {
            const key = document.getElementById('api-key-input').value.trim();
            if (!key) {
                document.getElementById('api-error-msg').classList.remove('hidden');
                return;
            }
            
            state.apiKey = key;
            state.model = document.getElementById('model-input').value.trim() || 'deepseek/deepseek-r1:free';
            state.systemPrompt = document.getElementById('system-prompt-input').value.trim();
            saveState();
            closeSettings();
        }

        // --- Chat Management ---
        function createNewChat() {
            if(state.isGenerating) return;
            const newChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: []
            };
            state.chats.unshift(newChat);
            state.activeChatId = newChat.id;
            saveState();
            renderSidebar();
            renderActiveChat();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function selectChat(id) {
            if(state.isGenerating) return;
            state.activeChatId = id;
            saveState();
            renderSidebar();
            renderActiveChat();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if(state.isGenerating) return;
            if(confirm("Delete this chat?")) {
                state.chats = state.chats.filter(c => c.id !== id);
                if (state.activeChatId === id) {
                    state.activeChatId = state.chats.length > 0 ? state.chats[0].id : null;
                }
                saveState();
                renderSidebar();
                renderActiveChat();
            }
        }

        function renameChat(id, event) {
            event.stopPropagation();
            const chat = state.chats.find(c => c.id === id);
            if(!chat) return;
            const newTitle = prompt("Enter new title:", chat.title);
            if(newTitle !== null && newTitle.trim() !== '') {
                chat.title = newTitle.trim();
                saveState();
                renderSidebar();
            }
        }

        function getActiveChat() {
            return state.chats.find(c => c.id === state.activeChatId);
        }

        // --- Rendering ---
        function renderSidebar() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            
            if (state.chats.length === 0) {
                list.innerHTML = '<div class="text-sm text-gray-500 p-4 text-center italic">No chats yet.</div>';
                return;
            }

            state.chats.forEach(chat => {
                const isActive = chat.id === state.activeChatId;
                const btn = document.createElement('div');
                btn.className = `group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all border ${
                    isActive 
                    ? 'bg-blue-50 dark:bg-blue-900/20 text-primary border-blue-200 dark:border-blue-800' 
                    : 'bg-transparent border-transparent hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'
                }`;
                btn.onclick = () => selectChat(chat.id);
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'truncate text-sm font-medium flex-1 mr-2';
                titleSpan.textContent = chat.title;

                const actionDiv = document.createElement('div');
                actionDiv.className = `flex items-center gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity ${isActive ? 'md:opacity-100' : ''}`;
                
                const renameBtn = document.createElement('button');
                renameBtn.className = "p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-primary transition-colors";
                renameBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>`;
                renameBtn.onclick = (e) => renameChat(chat.id, e);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = "p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-red-500 transition-colors";
                deleteBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;
                deleteBtn.onclick = (e) => deleteChat(chat.id, e);

                actionDiv.appendChild(renameBtn);
                actionDiv.appendChild(deleteBtn);
                btn.appendChild(titleSpan);
                btn.appendChild(actionDiv);
                list.appendChild(btn);
            });
        }

        function renderActiveChat() {
            const container = document.getElementById('chat-container');
            const welcome = document.getElementById('welcome-screen');
            const activeChat = getActiveChat();

            const existingMessages = container.querySelectorAll('.message-row');
            existingMessages.forEach(m => m.remove());

            if (!activeChat || activeChat.messages.length === 0) {
                welcome.style.display = 'flex';
                return;
            }

            welcome.style.display = 'none';
            activeChat.messages.forEach(msg => {
                appendMessageToDOM(msg.role, msg.content, false);
            });
            setTimeout(scrollToBottom, 50);
        }

        function appendMessageToDOM(role, content, animate = true) {
            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.className = `message-row flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} ${animate ? 'msg-animate' : ''}`;
            
            const bubble = document.createElement('div');
            
            if (role === 'user') {
                bubble.className = "max-w-[85%] md:max-w-[75%] rounded-2xl p-4 shadow-sm bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-tr-sm";
                bubble.textContent = content;
                row.appendChild(bubble);
            } else {
                bubble.className = "max-w-[90%] md:max-w-[85%] bg-transparent text-gray-900 dark:text-gray-100 markdown-body w-full";
                bubble.innerHTML = renderMarkdown(content);
                
                const wrapper = document.createElement('div');
                wrapper.className = "flex gap-3 w-full";
                
                const iconDiv = document.createElement('div');
                iconDiv.className = "w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center shrink-0 mt-1 border border-blue-200 dark:border-blue-800/50 shadow-sm";
                iconDiv.innerHTML = `<svg viewBox="0 0 24 24" class="w-5 h-5 md:w-6 md:h-6 text-primary"><polygon points="12,2 22,12 12,22 2,12" fill="transparent" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`;
                
                wrapper.appendChild(iconDiv);
                wrapper.appendChild(bubble);
                row.appendChild(wrapper);
            }

            container.appendChild(row);
            scrollToBottom();
            return bubble;
        }

        function renderMarkdown(text) {
            if(!text) return '';
            try {
                let rawHtml = marked.parse(text);
                return DOMPurify.sanitize(rawHtml, { ADD_TAGS: ['think'] }); // Allow <think> tags for DeepSeek models
            } catch(e) {
                console.error("Markdown parse error", e);
                return text; // Fallback to raw text
            }
        }

        // --- Core API Interaction (Streaming) ---
        async function handleSendMessage() {
            if (!state.apiKey) {
                openSettings();
                return;
            }

            const inputEl = document.getElementById('message-input');
            const text = inputEl.value.trim();
            if (!text || state.isGenerating) return;

            if (!state.activeChatId) {
                createNewChat();
            }

            const chat = getActiveChat();
            
            // Auto-title generation based on first message
            if (chat.messages.length === 0) {
                chat.title = text.length > 25 ? text.substring(0, 25) + '...' : text;
                renderSidebar();
            }

            // 1. Add User Message
            const userMsg = { role: 'user', content: text };
            chat.messages.push(userMsg);
            saveState();
            
            // 2. UI Updates for User Msg
            inputEl.value = '';
            inputEl.style.height = '52px';
            document.getElementById('welcome-screen').style.display = 'none';
            appendMessageToDOM('user', text, true);

            // 3. Prep Generation State
            state.isGenerating = true;
            document.getElementById('send-btn').disabled = true;
            
            // 4. Build API Payload
            const messagesPayload = [];
            if (state.systemPrompt) {
                messagesPayload.push({ role: 'system', content: state.systemPrompt });
            }
            // Map to generic format for API
            messagesPayload.push(...chat.messages.map(m => ({ role: m.role, content: m.content })));

            // 5. Create AI Loading Bubble
            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.className = `message-row flex w-full justify-start msg-animate`;
            const wrapper = document.createElement('div');
            wrapper.className = "flex gap-3 w-full";
            
            const iconDiv = document.createElement('div');
            iconDiv.className = "w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center shrink-0 mt-1 border border-blue-200 dark:border-blue-800/50 shadow-sm animate-pulse-fast";
            iconDiv.innerHTML = `<svg viewBox="0 0 24 24" class="w-5 h-5 md:w-6 md:h-6 text-primary"><polygon points="12,2 22,12 12,22 2,12" fill="transparent" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`;
            
            const bubble = document.createElement('div');
            bubble.className = "max-w-[90%] md:max-w-[85%] bg-transparent text-gray-900 dark:text-gray-100 markdown-body w-full";
            
            // Bouncing Loader Animation inserted
            bubble.innerHTML = `<div class="typing-loader"><span></span><span></span><span></span></div>`;
            
            wrapper.appendChild(iconDiv);
            wrapper.appendChild(bubble);
            row.appendChild(wrapper);
            container.appendChild(row);
            scrollToBottom();

            state.controller = new AbortController();
            let aiContent = '';

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.apiKey}`
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: messagesPayload,
                        stream: true
                    }),
                    signal: state.controller.signal
                });

                if (!response.ok) {
                    const errData = await response.json().catch(()=>({}));
                    if(response.status === 401) {
                        throw new Error("Authentication Error: Invalid API Key. Please update your settings.");
                    }
                    throw new Error(errData.error?.message || `API Error: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                
                // Clear loader and pulse animation on first byte received
                bubble.innerHTML = '';
                iconDiv.classList.remove('animate-pulse-fast');

                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete chunk in buffer

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || trimmed === 'data: [DONE]') continue;
                        
                        if (trimmed.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(trimmed.slice(6));
                                if (data.choices && data.choices[0].delta && data.choices[0].delta.content) {
                                    // Append text and show blinking cursor for typewriter effect
                                    aiContent += data.choices[0].delta.content;
                                    bubble.innerHTML = renderMarkdown(aiContent) + '<span class="cursor-blink"></span>';
                                    scrollToBottom();
                                }
                            } catch (e) {
                                // Ignore unparseable chunks (defensive check)
                            }
                        }
                    }
                }
                
                // Final render to remove cursor
                bubble.innerHTML = renderMarkdown(aiContent);

            } catch (error) {
                console.error("Stream error:", error);
                if (error.name !== 'AbortError') {
                    iconDiv.classList.remove('animate-pulse-fast');
                    const errorMsg = `\n\n**System Error:** ${error.message}`;
                    aiContent = aiContent ? aiContent + errorMsg : errorMsg;
                    bubble.innerHTML = renderMarkdown(aiContent);
                    
                    if(error.message.includes("Authentication")) {
                        setTimeout(openSettings, 1500);
                    }
                }
            } finally {
                state.isGenerating = false;
                document.getElementById('send-btn').disabled = false;
                state.controller = null;
                
                if (aiContent) {
                    chat.messages.push({ role: 'assistant', content: aiContent });
                    saveState();
                }
                scrollToBottom();
            }
        }
    </script>
</body>
